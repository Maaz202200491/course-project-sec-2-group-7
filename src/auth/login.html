<!--
  Requirement: Create a Responsive Login Page

  Instructions:
  Fill in the HTML elements as described in the comments.
  Use the provided IDs for the elements that require them.
  You are encouraged to use a CSS framework for styling, as hinted in the comments,
  but you can also use your own stylesheet.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Add the 'meta' tag to specify the character encoding for the document to be UTF-8. -->
    <meta charset="UTF-8">

    <!-- Add the 'meta' tag that makes the page responsive. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Add a 'title' for the page. It should be "Login". -->
    <title>Login</title>

    <!-- Link to a CSS file or CSS framework to style the page. -->
    <link rel="stylesheet" href="../common/styles.css">
</head>

<body>

    <!-- This will be the main content area of the page. -->
    <!-- Use the 'main' element to contain the login form. -->
    <main class="auth-page">

        <!-- This 'section' groups the related content of the login form. -->
        <!-- Create a 'section' element to act as the login card. -->
        <section class="auth-card">

            <!-- The heading of the login form -->
            <!-- Add a heading element for the form's title. -->
            <h1>Welcome Back!</h1>

            <!-- The form element will wrap all the inputs. -->
            <!-- Create a 'form' element with id "login-form". -->
            <form id="login-form" action="#">

                <!-- Use a 'fieldset' to group all the related controls for the login form. -->
                <fieldset>

                    <!-- Add a 'legend' to caption the fieldset. -->
                    <legend>Secure Login</legend>

                    <!-- Add a 'label' for the email input field. -->
                    <label for="email">Email Address</label>

                    <!-- Add an input field for the email. -->
                    <input type="email" id="email" required>

                    <!-- Add a 'label' for the password input field. -->
                    <label for="password">Password</label>

                    <!-- Add an input field for the password. -->
                    <input type="password" id="password" required minlength="8">

                    <!-- This is the form submission button. -->
                    <!-- Add a button to submit the form. -->
                    <button type="submit" id="login">Log In</button>

                </fieldset>

                <!-- Add a div element here with id="message-container". -->
                <div id="message-container"></div>

            </form>

        </section>

    </main>

    <!-- Link the login.js script here using a script tag with the defer attribute. -->
    <script src="login.js" defer></script>

</body>
</html>
